<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">🚚</span>
      <div>
        <div class="sidebar-title">DeliveryApp</div>
        <div class="sidebar-subtitle">Admin Panel</div>
      </div>
    </div>

    <ul class="nav-list">
      @for (item of navItems; track item.route) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
            <span class="nav-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">👤</div>
        <div>
          <div class="user-name">{{ getUserEmail() }}</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm logout-btn" (click)="logout()">Sign out</button>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-right">
        <span class="topbar-user">{{ getUserEmail() }}</span>
        <button class="btn btn-outline btn-sm" (click)="logout()">Logout</button>
      </div>
    </header>
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
